buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 35
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.7.3")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            url "$rootDir/../node_modules/@react-native-async-storage/async-storage/android/local_repo"
        }
    }

    // Force specific dependency versions with 16KB support
    configurations.all {
        resolutionStrategy {
            // Force 16KB compatible version of pdfiumandroid
            force 'io.legere:pdfiumandroid:1.0.35'
        }
    }

    // Inject 16KB page size linker flags for all C/C++ builds
    plugins.withId("com.android.application") {
        android {
            defaultConfig {
                externalNativeBuild {
                    cmake {
                        arguments "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,-z,max-page-size=16384"
                    }
                    ndkBuild {
                        arguments "APP_LDFLAGS=-Wl,-z,max-page-size=16384"
                    }
                }
            }
        }
    }
    plugins.withId("com.android.library") {
        android {
            defaultConfig {
                externalNativeBuild {
                    cmake {
                        arguments "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,-z,max-page-size=16384"
                    }
                    ndkBuild {
                        arguments "APP_LDFLAGS=-Wl,-z,max-page-size=16384"
                    }
                }
            }
        }
    }
}
